<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>10secondsデッキバトル</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="top-banner">
        <div class="title-phase-wrap">
          <div class="title-block">
            <p class="eyebrow">5ターン / ターン1回選択 / 全カード使用</p>
            <h1>10secondsデッキバトル</h1>
            <p class="hero-copy">左に味方、右に敵。読み合いで勝つ短期バトルゲーム。</p>
            <section class="title-log-panel">
              <div class="section-heading compact-heading">
                <h3>バトルログ</h3>
                <span>最新3件</span>
              </div>
              <div id="battleLog" class="log-list compact-log title-log-list"></div>
            </section>
          </div>
          <div class="phase-block">
            <p class="phase-label">現在フェーズ</p>
            <h2 id="phaseTitle">キャラ選択</h2>
            <strong id="turnLabel">準備中</strong>
            <label class="bgm-select-wrap">
              <span>対戦モード</span>
              <select id="modeSelect" class="bgm-select">
                <option value="cpu">CPU対戦</option>
                <option value="pvp">2人対戦</option>
              </select>
            </label>
            <label class="bgm-select-wrap">
              <span>BGM</span>
              <select id="bgmSelect" class="bgm-select">
                <option value="last-card">最後の一枚</option>
                <option value="blade-edge">カードの刃先</option>
              </select>
            </label>
            <div class="phase-actions">
              <button id="soundButton" class="sound-button" type="button" aria-pressed="true">音 ON</button>
              <button id="resetButton" class="secondary-button" type="button">もう1回</button>
            </div>
          </div>
        </div>
      </section>

      <section class="panel arena-panel">
        <div class="arena-stage">
          <section class="fighter-column player-column">
            <div id="playerFighter" class="fighter-card player-fighter" data-side="player" data-character="neutral">
              <div class="fighter-base"></div>
              <div id="playerEffect" class="fighter-effect"></div>
              <img id="playerStageImg" class="stage-photo" src="" alt="" />
            </div>

            <article class="hp-card player battle-hud">
              <div class="hp-card-top">
                <div id="playerAvatar" class="status-avatar" data-character="neutral" aria-hidden="true">
                  <img id="playerAvatarImg" class="status-photo" src="" alt="" />
                </div>
                <div class="hp-info">
                  <div class="hp-head">
                    <span id="playerName">PLAYER</span>
                    <strong id="playerHp">0 / 100</strong>
                  </div>
                  <small id="playerCharge">ため +0</small>
                </div>
              </div>
              <div class="hp-bar"><div id="playerHpFill" class="hp-fill"></div></div>
            </article>

            <section id="playerSkillDock" class="panel mini-panel skill-dock skill-dock-player">
              <div class="section-heading compact-heading">
                <h3 id="leftTitle">キャラクター選択</h3>
                <span id="selectionCounter">5体から選択</span>
              </div>
              <p id="statusText" class="status-text">まずはキャラクターを1体選んでください。</p>
              <div id="skillPool" class="skill-grid compact-skill-grid" hidden></div>
            </section>
          </section>

          <section class="arena-middle">
            <section class="panel mini-panel reveal-panel arena-reveal" id="revealPanel">
              <div class="section-heading compact-heading">
                <h3>公開</h3>
                <div class="result-badge" id="resultBadge">READY</div>
              </div>
              <p id="revealText" class="reveal-line">キャラクターを選んでください</p>
              <p id="resultReason" class="result-reason">勝負の決め手がここに出ます。</p>
            </section>
          </section>

          <section class="fighter-column cpu-column">
            <div id="cpuFighter" class="fighter-card cpu-fighter" data-side="cpu" data-character="neutral">
              <div class="fighter-base"></div>
              <div id="cpuEffect" class="fighter-effect"></div>
              <img id="cpuStageImg" class="stage-photo cpu-stage-photo" src="" alt="" />
            </div>

            <article class="hp-card cpu battle-hud">
              <div class="hp-card-top">
                <div id="cpuAvatar" class="status-avatar cpu-avatar" data-character="neutral" aria-hidden="true">
                  <img id="cpuAvatarImg" class="status-photo" src="" alt="" />
                </div>
                <div class="hp-info">
                  <div class="hp-head">
                    <span id="cpuName">CPU</span>
                    <strong id="cpuHp">0 / 100</strong>
                  </div>
                  <small id="cpuCharge">ため +0</small>
                </div>
              </div>
              <div class="hp-bar"><div id="cpuHpFill" class="hp-fill cpu-fill"></div></div>
            </article>

            <section class="panel mini-panel cpu-panel">
              <div class="section-heading compact-heading">
                <h3>相手スキル</h3>
                <span id="cpuStyle">標準AI</span>
              </div>
              <div id="cpuHand" class="hand-grid cpu-grid compact-hand-grid"></div>
            </section>
          </section>
        </div>
      </section>

      <section id="setupPanel" class="panel compact-panel">
        <div class="section-heading compact-heading">
          <h3>キャラクター選択</h3>
          <span>ステータス確認</span>
        </div>
        <div id="characterPool" class="character-grid"></div>
      </section>
    </main>

    <template id="characterCardTemplate">
      <button class="character-card" type="button">
        <div class="character-avatar" data-character="neutral" aria-hidden="true">
          <img class="character-photo" src="" alt="" />
        </div>
        <div class="character-header">
          <strong class="character-name"></strong>
          <span class="character-emoji"></span>
        </div>
        <p class="character-style"></p>
        <div class="character-stats"></div>
      </button>
    </template>

    <template id="skillCardTemplate">
      <button class="skill-card compact-card" type="button">
        <div class="skill-header">
          <strong class="skill-name"></strong>
          <span class="skill-tag"></span>
        </div>
        <p class="skill-description"></p>
        <div class="skill-footer">
          <span class="skill-power"></span>
          <span class="skill-state"></span>
        </div>
      </button>
    </template>

    <script src="./script.js"></script>
  </body>
</html>
