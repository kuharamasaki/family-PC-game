<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>10secondsデッキバトル</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">3ターン / 毎ターン1枚選択 / 同時公開</p>
          <h1>10secondsデッキバトル</h1>
        </div>
        <button id="resetButton" class="reset-button" type="button">もう1回</button>
      </header>

      <section class="hero">
        <div class="hero-main">
          <p id="phaseTitle" class="phase-title">第1ターン</p>
          <p id="statusText" class="status-text">残っているスキルから1枚選ぶと、すぐにCPUと同時発動します。</p>
          <div class="hero-result">
            <strong id="revealText">1ターン目のカードを選んでください</strong>
            <span id="resultBadge" class="badge">BATTLE</span>
          </div>
        </div>
        <div class="hero-side">
          <div class="result-box">
            <span class="result-label">結果</span>
            <strong id="resultHeadline">進行中</strong>
          </div>
          <div class="stats">
            <div class="stat">
              <span>あなた</span>
              <strong id="playerHp">10</strong>
            </div>
            <div class="stat">
              <span>CPU</span>
              <strong id="cpuHp">10</strong>
            </div>
            <div class="stat">
              <span>ターン</span>
              <strong id="turnLabel">1 / 3</strong>
            </div>
          </div>
          <div class="meta">
            <span id="selectionCounter">5 / 5 使用可能</span>
            <span id="playerCharge">あなた 溜め: 0</span>
            <span id="cpuCharge">CPU 溜め: 0</span>
          </div>
        </div>
      </section>

      <section class="board">
        <section class="panel">
          <div class="panel-head">
            <h2>スキル</h2>
            <span class="tiny-note">選べるのは残りだけ</span>
          </div>
          <div id="skillPool" class="skill-list"></div>
        </section>

        <section class="panel side-panel">
          <div class="usage-grid">
            <div>
              <div class="panel-head">
                <h2>あなた</h2>
              </div>
              <div id="playerHand" class="used-list"></div>
            </div>
            <div>
              <div class="panel-head">
                <h2>CPU</h2>
              </div>
              <div id="cpuHand" class="used-list"></div>
            </div>
          </div>

          <div class="panel-head log-head">
            <h2>ログ</h2>
            <span class="tiny-note">要約</span>
          </div>
          <div id="battleLog" class="log-list"></div>
        </section>
      </section>

      <template id="skillCardTemplate">
        <button class="skill-card" type="button">
          <strong class="skill-name"></strong>
          <span class="skill-tag"></span>
          <p class="skill-description"></p>
        </button>
      </template>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
